name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -project LapinBrowser.xcodeproj \
            -scheme LapinBrowser \
            -configuration Release \
            -archivePath build/LapinBrowser.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Sign ad-hoc
        run: |
          codesign --force --deep --sign "-" \
            build/LapinBrowser.xcarchive/Products/Applications/LapinBrowser.app

      - name: Create zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent \
            build/LapinBrowser.xcarchive/Products/Applications/LapinBrowser.app \
            "build/LapinBrowser-${VERSION}.zip"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --repo smcoelho/lapin-browser \
            --title "$GITHUB_REF_NAME" \
            --notes "Lapin Browser $GITHUB_REF_NAME" \
            "build/LapinBrowser-${VERSION}.zip#LapinBrowser-${VERSION}.zip"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "build/LapinBrowser-${VERSION}.zip" | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/smcoelho/homebrew-tap.git" /tmp/homebrew-tap

          sed -i '' "s/^  version \".*\"/  version \"${VERSION}\"/" /tmp/homebrew-tap/Casks/lapin-browser.rb
          sed -i '' "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" /tmp/homebrew-tap/Casks/lapin-browser.rb

          cd /tmp/homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/lapin-browser.rb
          git commit -m "lapin-browser: update to v${VERSION}"
          git push
